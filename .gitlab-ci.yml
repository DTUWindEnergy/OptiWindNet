spec:
  inputs:
    run:
      default: ci
      options: [ci, docs]
      description: >-
        Manual-dispatch target shown in the "Run pipeline" form:
        'ci' runs the normal test suite, 'docs' rebuilds GitLab Pages.
---
# stages:
#   - base
#   - deploy

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "web"

# Python version lists for test jobs (update these when adding/removing versions)
.default_python: &default_python ["3.14"]
.other_pythons: &other_pythons ["3.11", "3.12", "3.13"]

variables:
  # Manual-dispatch intent (see spec:inputs above). Defaults to "ci" for every
  # push/MR/tag pipeline, so normal CI is unaffected; the UI form overrides it.
  RUN: "$[[ inputs.run ]]"
  # Tools = {
  #     sphinx (publish docs on Gitlab Pages),
  #     twine (publish package on PyPI)
  # } (all running on linux)
  PYTHON_VERSION_FOR_TOOLS: "3.13"
  SCIP_VERSION: "10.0.2"
  SCIP_RELEASE_BASE_URL: "https://github.com/scipopt/scip/releases/download/v${SCIP_VERSION}"
  SCIP_LINUX: "scipoptsuite_${SCIP_VERSION}-1+trixie_amd64.deb"
  SCIP_WINDOWS: "scipoptsuite-${SCIP_VERSION}-win-x64"

# ===== Base templates =====
.test_linux_base:
  # stage: base
  image: python:${PYTHON_VERSION}
  tags: [linux]
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  before_script:
    - export DEBIAN_FRONTEND=noninteractive
    - echo 'deb http://debian.lth.se/debian testing main contrib' | tee /etc/apt/sources.list.d/debian-testing.list
    - |
      printf 'Package: *\nPin: release a=testing\nPin-Priority: 100\n' | tee /etc/apt/preferences.d/99-testing-low-priority
    - apt-get update
    - apt-get install -yq coinor-cbc
    - apt install -yq -t testing scip
    # >>> scip/fscip section begin
    # - test -f "downloads/$SCIP_LINUX" || wget --no-verbose -P downloads "$SCIP_RELEASE_BASE_URL/$SCIP_LINUX"
    # - apt-get install -yq "./downloads/$SCIP_LINUX"
    # <<< scip/fscip section end
    - python3 -m venv tests/venv
    - source tests/venv/bin/activate
    - pip install --progress-bar off -e .[test]
    - python3 --version
  script:
    - pytest --numprocesses auto --cov-report term-missing:skip-covered --cov=optiwindnet --cov-config .coveragerc
  cache:
    key: linux-scip-downloads
    paths:
      - downloads

.test_windows_base:
  # stage: base
  image: registry.windenergy.dtu.dk/dockerimages/windows-miniconda:ltsc2019
  tags: [docker-windows]
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  before_script:
    - Write-Host "=== Windows CI diag ==="
    - whoami; python --version; python -m pip --version
    - '"USERPROFILE=$env:USERPROFILE"; "TEMP=$env:TEMP"; "TMP=$env:TMP"'
    - Write-Host "`n=== Disk ==="
    - |
      Get-CimInstance Win32_LogicalDisk -Filter "DriveType=3" |
        % { "{0}: free {1:n1} GB / {2:n1} GB ({3:n1}%)" -f $_.DeviceID,($_.FreeSpace/1GB),($_.Size/1GB),(100*$_.FreeSpace/$_.Size) }
    - Write-Host "`n=== Python temp ==="
    - python -c "import tempfile,os; p=tempfile.gettempdir(); print(p); print('writable=',os.access(p,os.W_OK))"
    - Write-Host "`n=== Temp ACL + write/delete ==="
    - |
      @($env:TEMP,$env:TMP) | Select-Object -Unique | % {
        "`n$_"; icacls $_
        $f = Join-Path $_ ("ci-test-" + [guid]::NewGuid())
        try { 'x' > $f; Remove-Item $f -Force; "write/delete: OK" }
        catch { "write/delete: FAILED: $($_.Exception.Message)" }
      }
    - Write-Host "=== <END> Windows CI diag ==="
    # The next 3 lines install the Miniforge3 conda
    # - Invoke-WebRequest -UserAgent curl https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Windows-x86_64.exe -OutFile Miniforge3-Windows-x86_64.exe
    # - Start-Process -Wait -FilePath Miniforge3-Windows-x86_64.exe -ArgumentList "/InstallationType=JustMe","/RegisterPython=0","/S","/D=$($env:UserProfile)\condaforge"
    # - . "$($env:UserProfile)\condaforge\shell\condabin\conda-hook.ps1"
    - (conda shell.powershell hook) | Out-String | ?{$_} | Invoke-Expression
    - conda config --add channels conda-forge
    - conda config --set channel_priority strict
    - conda create -y -q --name own_test python=${PYTHON_VERSION}
    - conda activate own_test
    # the packages beyond the solvers are dependencies that would be pulled later via pip install
    # setuptools/setuptools-scm are here (rather than left to pip's build isolation) because
    # pip's default build isolation creates a fresh throwaway venv (freshly-written python.exe
    # et al.), which on this runner races Windows Defender's real-time scan and crashes with
    # STATUS_IN_PAGE_ERROR (exit code 3221225478 / 0xC0000006); --no-build-isolation below then
    # reuses this env instead of creating a new one.
    - conda install -y -q coin-or-cbc numba networkx shapely scipy pyyaml bitarray pandas pillow "setuptools>=80" "setuptools-scm>=8"
    # >>> scip/fscip section begin
    - |
      if (Test-Path "downloads\$env:SCIP_WINDOWS.zip") {
        Write-Host "SCIP archive cache hit: downloads\$env:SCIP_WINDOWS.zip"
      } else {
        Write-Host "SCIP archive cache miss, downloading $env:SCIP_RELEASE_BASE_URL/$env:SCIP_WINDOWS.zip"
        New-Item -Force -Name "downloads" -ItemType "Directory" | Out-Null
        Invoke-WebRequest -UserAgent curl "$env:SCIP_RELEASE_BASE_URL/$env:SCIP_WINDOWS.zip" -OutFile "downloads\$env:SCIP_WINDOWS.zip"
      }
    - Expand-Archive -Path "downloads\$env:SCIP_WINDOWS.zip" -DestinationPath .
    - $env:Path = "$env:Path;$env:SCIP_WINDOWS\bin\"
    # <<< scip/fscip section end
    - pip install --progress-bar off --no-build-isolation -e .[test]
    - python --version
  script:
    - pytest --numprocesses auto --cov-report term-missing:skip-covered --cov=optiwindnet --cov-config .coveragerc
  cache:
    key: windows-scip-downloads
    paths:
      - downloads

# ===== Test OptiWindNet on Linux =====
test_linux:
  extends: .test_linux_base
  parallel:
    matrix:
      - PYTHON_VERSION: *default_python
  rules:
    - if: $RUN != "ci"
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH || $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/main
        paths:
          - pyproject.toml
          - optiwindnet/**/*
          - tests/**/*

# ===== Test OptiWindNet on Windows =====
test_windows:
  extends: .test_windows_base
  parallel:
    matrix:
      - PYTHON_VERSION: *default_python
  rules:
    - if: $RUN != "ci"
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/main
        paths:
          - pyproject.toml
          - optiwindnet/**/*
          - tests/**/*
    - if: $CI_COMMIT_BRANCH
      changes:
        compare_to: refs/heads/main
        paths:
          - pyproject.toml
          - optiwindnet/**/*
          - tests/**/*
      when: manual
      allow_failure: true

# ===== Manual multi-version test matrix =====
test_matrix_linux:
  extends: .test_linux_base
  allow_failure: true
  rules:
    - if: $RUN != "ci"
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: never
    - if: $CI_COMMIT_BRANCH || $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/main
        paths:
          - pyproject.toml
          - optiwindnet/**/*
          - tests/**/*
      when: manual
  parallel:
    matrix:
      - PYTHON_VERSION: *other_pythons

test_matrix_windows:
  extends: .test_windows_base
  allow_failure: true
  rules:
    - if: $RUN != "ci"
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: never
    - if: $CI_COMMIT_BRANCH || $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/main
        paths:
          - pyproject.toml
          - optiwindnet/**/*
          - tests/**/*
      when: manual
  parallel:
    matrix:
      - PYTHON_VERSION: *other_pythons

# ===== Update GitLab Pages =====
make_pages:
  # stage: base
  image: python:$PYTHON_VERSION_FOR_TOOLS
  tags: [linux]
  pages: true
  allow_failure: true
  rules:
    # Manual dispatch: pick run=docs in the "Run pipeline" form (no file changes required)
    - if: $RUN == "docs"
    # Auto-appear (still manual) on pushes to the default branch that touch docs/source
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - docs/**/*
        - optiwindnet/**/*.py
      when: manual
  script:
    - apt-get update
    - apt-get -yq install make pandoc graphviz
    - pip install --progress-bar off .[docs] --upgrade
    - make -C docs html
    - mv docs/build/html public/
  artifacts:
    paths: [public]

# ===== Publish new version on PyPI =====
pypi_deploy:
  # stage: deploy
  image: python:$PYTHON_VERSION_FOR_TOOLS
  tags: [linux]
  rules:
    - if: $RUN != "ci"
      when: never
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  before_script:
    - |
      if ! git branch -a --contains "$CI_COMMIT_SHA" | grep -q "origin/$CI_DEFAULT_BRANCH"; then
        echo "ERROR: Tag is not reachable from $CI_DEFAULT_BRANCH, aborting deploy"
        exit 1
      fi
  script:
    - pip install --progress-bar off --upgrade pip build twine packaging
    - python3 -m build
    - twine upload dist/* -u $TWINE_USERNAME -p $TWINE_PASSWORD
